# Hero
hero:
  enable: true
  weight: 10
  template: hero

  title: "OpenLvVision"
  subtitle: "An direct OpenCV API access natively in LabVIEW. Run AI neural networks and GPU accelerated computer vision, completely free and open source."
  
  backgroundImage:
    path: "images/templates/hero"
    filename:
      desktop: "gradient-desktop.webp"
      mobile: "gradient-mobile.webp"
  
  image:
    path: "images"
    filename: "Logo.png" 
    alt: "OpenLvVision LabVIEW OpenCV AI CUDA Logo" 
    boxShadow: false 
    rounded: true 

  ctaButton:
    icon: book_ribbon
    btnText: "Documentation"
    url: "docs/"
  cta2Button:
    icon: rebase_edit
    btnText: "GitHub Repository" 
    url: "https://github.com/OpenLvVision/"

  info: "**Open Source** BSD-3-Clause"
  
imageText:
  enable: true
  weight: 20
  template: image text

  title: Built on Vision Common Resources
  subtitle: OpenLvVision is engineered to work seamlessly with LabVIEW's native Vision Common Resources. Call OpenCV directly with zero memory-copy overhead and integrate effortlessly with other image libraries.

  image:
    path: "images/"
    filename: "OpenLvVision_Overview.png"
    alt: "LabVIEW Vision Common Resources OpenCV Integration" 

  imgOrder:
    desktop: 2
    mobile: 1

  # SEO BOOST: Updated the list to reflect direct calls and hardware acceleration perfectly
  list:
    - text: Direct OpenCV Function Calls
      icon: data_object

    - text: CUDA GPU Acceleration
      icon: memory

    - text: OpenVINO Neural Networks
      icon: psychology 

    - text: Native Interoperability
      icon: hub

imageCompare:
  enable: false